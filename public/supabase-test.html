<!DOCTYPE html>
<html>
<head>
  <title>Supabase Write Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
    pre { white-space: pre-wrap; word-break: break-all; }
    .ok { color: #0f0; } .err { color: #f44; } .warn { color: #fa0; }
    h2 { color: #fff; margin-top: 20px; }
  </style>
</head>
<body>
<pre id="out">Starting tests...</pre>
<script>
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJscXJ5amhqd3R5Z2Fmand4YnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjAxMTEsImV4cCI6MjA4NDczNjExMX0.k6PtzF9OE3wIQ8CxM0IPwAkZag3Iz5ed72bKS3-ttv8';
const BASE = 'https://blqryjhjwtygafjwxbup.supabase.co/rest/v1';
const out = document.getElementById('out');

function log(msg, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = '\n' + msg;
  out.appendChild(span);
}

async function run() {
  const sessionKey = Object.keys(localStorage).find(k => k.includes('supabase') || k.includes('auth-token'));
  if (!sessionKey) { log('Not logged in — please log in at localhost:3002 first.', 'err'); return; }

  let session;
  try { session = JSON.parse(localStorage.getItem(sessionKey)); } catch(e) {}
  const accessToken = session?.access_token || session?.currentSession?.access_token;
  const userId = session?.user?.id || session?.currentSession?.user?.id;
  log('User ID: ' + userId);

  if (!accessToken) { log('No access token found.', 'err'); return; }

  const headers = {
    'apikey': ANON_KEY,
    'Authorization': 'Bearer ' + accessToken,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  };

  // --- POSTS tests (regression) ---
  log('\n\n=== POSTS: UPDATE (was broken, should now pass) ===');
  const postsRes = await fetch(BASE + '/posts?select=id,title&order=created_at.desc&limit=1', { headers });
  const posts = await postsRes.json();
  const postId = posts[0]?.id;
  log('Latest post: ' + JSON.stringify(posts[0]));
  if (postId) {
    const updRes = await fetch(BASE + '/posts?id=eq.' + postId, {
      method: 'PATCH', headers,
      body: JSON.stringify({ title: posts[0]?.title }) // no-op update (same title)
    });
    const updBody = await updRes.json();
    log('UPDATE status: ' + updRes.status + ' | rows: ' + updBody.length, updBody.length > 0 ? 'ok' : 'err');
  }

  // --- MARKETPLACE tests ---
  log('\n\n=== MARKETPLACE: READ items ===');
  const mktRes = await fetch(BASE + '/marketplace_items?select=id,title,price,seller_id&order=created_at.desc&limit=5', { headers });
  const mktBody = await mktRes.json();
  log('Status: ' + mktRes.status + ' | items found: ' + (Array.isArray(mktBody) ? mktBody.length : 'error'), mktRes.ok ? 'ok' : 'err');
  if (Array.isArray(mktBody)) {
    mktBody.forEach(item => log('  - ' + item.title + ' ($' + item.price + ')', 'ok'));
  } else {
    log('Error: ' + JSON.stringify(mktBody), 'err');
  }

  log('\n\n=== MARKETPLACE: INSERT + UPDATE + DELETE ===');
  const insRes = await fetch(BASE + '/marketplace_items', {
    method: 'POST', headers,
    body: JSON.stringify({ title: 'test-item-' + Date.now(), category: 'Other', price: 1.00, condition: 'Good', description: 'automated test', seller_id: userId, contact: 'test' })
  });
  const insBody = await insRes.json();
  log('INSERT status: ' + insRes.status, insRes.ok ? 'ok' : 'err');
  const newItemId = Array.isArray(insBody) ? insBody[0]?.id : null;

  if (newItemId) {
    const updRes = await fetch(BASE + '/marketplace_items?id=eq.' + newItemId, {
      method: 'PATCH', headers,
      body: JSON.stringify({ title: 'test-item-EDITED' })
    });
    const updBody = await updRes.json();
    log('UPDATE status: ' + updRes.status + ' | rows: ' + (Array.isArray(updBody) ? updBody.length : 'n/a'), (Array.isArray(updBody) && updBody.length > 0) ? 'ok' : 'err');

    const delRes = await fetch(BASE + '/marketplace_items?id=eq.' + newItemId, {
      method: 'DELETE', headers: { ...headers, 'Prefer': 'return=minimal' }
    });
    log('DELETE status: ' + delRes.status, delRes.ok ? 'ok' : 'err');
  }

  log('\n\n=== MARKETPLACE SAVES: INSERT + DELETE ===');
  const sampleItem = Array.isArray(mktBody) && mktBody.length > 0 ? mktBody[0] : null;
  if (sampleItem) {
    const saveRes = await fetch(BASE + '/marketplace_saves', {
      method: 'POST', headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ item_id: sampleItem.id, user_id: userId })
    });
    log('SAVE INSERT status: ' + saveRes.status, saveRes.ok ? 'ok' : 'warn');
    const unsaveRes = await fetch(BASE + '/marketplace_saves?item_id=eq.' + sampleItem.id + '&user_id=eq.' + userId, {
      method: 'DELETE', headers: { ...headers, 'Prefer': 'return=minimal' }
    });
    log('SAVE DELETE status: ' + unsaveRes.status, unsaveRes.ok ? 'ok' : 'err');
  }

  log('\n\n=== DONE ===', 'ok');
}

run().catch(e => log('\nError: ' + e.message, 'err'));
</script>
</body>
</html>
